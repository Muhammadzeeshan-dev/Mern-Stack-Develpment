<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practise exercise</title>
</head>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
    #greeting{
        color: green;
    }
    #myBtn{
        padding: 10px 20px;
        font-size: 16px;
        background-color: blue;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    #myBtn:hover{
        background-color: darkblue;
    }
    

</style>
<body>
  <h3 id = greeting>
  </h3>
  <button id = "myBtn" onclick = "incrementCounter();">0</button>
    <script>
          function doGreating(personName = "Guest"){
  let date = new Date();
  let hours = date.getHours();
  let heading = document.getElementById("greeting");
    if(hours > 5 && hours < 12){
        heading.innerText = `Good Morning, ${personName}!`;
    }
    else if(hours >= 12 && hours < 18){
        heading.innerText = `Good Afternoon, ${personName}!`;
    }
    else{
        heading.innerText = `Good Evening, ${personName}!`;
    }
}
doGreating("Zeeshan");
let numberofClicks = localStorage.getItem("numberofClicks") || 0;
function incrementCounter(){
  let button = document.getElementById("myBtn");
    numberofClicks++;
    localStorage.setItem("numberofClicks", numberofClicks);
    button.innerText = numberofClicks;
    if (numberofClicks % 2 === 0){
        button.style.backgroundColor = "blue";
    }
    else{
        button.style.backgroundColor = "green";
    }

}

    </script>
</body>
</html>
