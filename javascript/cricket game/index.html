<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat · Ball · Stamp Game</title>
</head>
<body>
<div class="game-box">
    <h1>BAT · BALL · STAMP</h1>
    <div class="sub">pick your move</div>

    <div class="score-board">
        <div class="score-row">
            <div class="score-card">
                <div class="score-label">WINS</div>
                <div class="score-number" id="winCount">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">LOSSES</div>
                <div class="score-number" id="lossCount">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">DRAWS</div>
                <div class="score-number" id="drawCount">0</div>
            </div>
        </div>
    </div>

    <div class="result-area" id="resultMessage">
        Click a button: Bat, Ball or Stamp
    </div>

    <div class="buttons">
        <button class="game-btn" id="batBtn">BAT</button>
        <button class="game-btn" id="ballBtn">BALL</button>
        <button class="game-btn" id="stampBtn">STAMP</button>
    </div>
    <footer>Bat beats Ball | Ball beats Stamp | Stamp beats Bat</footer>
</div>

<script>
    const gameScore = {
        wins: 0,
        losses: 0,
        draws: 0
    };

    function updateScoreUI() {
        document.getElementById('winCount').innerText = gameScore.wins;
        document.getElementById('lossCount').innerText = gameScore.losses;
        document.getElementById('drawCount').innerText = gameScore.draws;
    }

    // Computer choice: returns "Bat", "Ball", or "Stamp"
    function getComputerChoice() {
        const randomNum = Math.floor(Math.random() * 3);  
        if (randomNum === 0) return "Bat";
        if (randomNum === 1) return "Ball";
        return "Stamp";
    }

    function determineResult(user, computer) {
        if (user === computer) return "draw";
        if (
            (user === "Bat" && computer === "Ball") ||
            (user === "Ball" && computer === "Stamp") ||
            (user === "Stamp" && computer === "Bat")
        ) {
            return "win";
        }
        return "loss";
    }
    function updateScoreObject(result) {
        if (result === "win") {
            gameScore.wins++;
        } else if (result === "loss") {
            gameScore.losses++;
        } else if (result === "draw") {
            gameScore.draws++;
        }
        updateScoreUI();  
    }
    function showGameMessage(userMove, computerMove, resultType) {
        const resultDiv = document.getElementById("resultMessage");
        let outcomeText = "";
        if (resultType === "win") {
            outcomeText = "YOU WIN !";
        } else if (resultType === "loss") {
            outcomeText = "COMPUTER WINS !";
        } else {
            outcomeText = "MATCH DRAW !";
        }
        resultDiv.innerHTML = `You chose ${userMove}  |  Computer chose ${computerMove}<br><strong>  |   ${outcomeText}</strong>`;
    }
    function playRound(userMove) {
        const computerChoice = getComputerChoice();
        const result = determineResult(userMove, computerChoice);
        updateScoreObject(result);
        showGameMessage(userMove, computerChoice, result);
    }
    document.getElementById("batBtn").addEventListener("click", function() {
        playRound("Bat");
    });
    document.getElementById("ballBtn").addEventListener("click", function() {
        playRound("Ball");
    });
    document.getElementById("stampBtn").addEventListener("click", function() {
        playRound("Stamp");
    });
    updateScoreUI();
</script>
</body>
</html>
