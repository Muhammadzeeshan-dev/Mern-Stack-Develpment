<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: lightgray;
        }
        .board {
            width: 330px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
        }
        .box {
            width: 100px;
            height: 100px;
            background: white;
            border: 1px solid black;
            font-size: 40px;
            line-height: 100px;
            cursor: pointer;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <h2 id="msg">Player X Turn</h2>
    <div class="board">
        <div class="box" onclick="play(0)"></div>
        <div class="box" onclick="play(1)"></div>
        <div class="box" onclick="play(2)"></div>
        <div class="box" onclick="play(3)"></div>
        <div class="box" onclick="play(4)"></div>
        <div class="box" onclick="play(5)"></div>
        <div class="box" onclick="play(6)"></div>
        <div class="box" onclick="play(7)"></div>
        <div class="box" onclick="play(8)"></div>
    </div>
    <button onclick="restart()">Restart</button>
    <script>
        let turn = "X";
        let gameOver = false;
        let box = document.getElementsByClassName("box");
        let msg = document.getElementById("msg");
        function play(i) {
            if (box[i].innerHTML == "" && gameOver == false) {
                box[i].innerHTML = turn;
                checkWinner();
                if (gameOver == false) {
                    if (turn == "X") {
                        turn = "O";
                    } else {
                        turn = "X";
                    }
                    msg.innerHTML = "Player " + turn + " Turn";
                }
            }
        }
        function checkWinner() {
            // win
            if (
                box[0].innerHTML == box[1].innerHTML &&
                box[1].innerHTML == box[2].innerHTML &&
                box[0].innerHTML != ""
            ) {
                win(box[0].innerHTML);
            }
            else if (
                box[3].innerHTML == box[4].innerHTML &&
                box[4].innerHTML == box[5].innerHTML &&
                box[3].innerHTML != ""
            ) {
                win(box[3].innerHTML);
            }
            else if (
                box[6].innerHTML == box[7].innerHTML &&
                box[7].innerHTML == box[8].innerHTML &&
                box[6].innerHTML != ""
            ) {
                win(box[6].innerHTML);
            }
            else if (
                box[0].innerHTML == box[3].innerHTML &&
                box[3].innerHTML == box[6].innerHTML &&
                box[0].innerHTML != ""
            ) {
                win(box[0].innerHTML);
            }
            else if (
                box[1].innerHTML == box[4].innerHTML &&
                box[4].innerHTML == box[7].innerHTML &&
                box[1].innerHTML != ""
            ) {
                win(box[1].innerHTML);
            }
            else if (
                box[2].innerHTML == box[5].innerHTML &&
                box[5].innerHTML == box[8].innerHTML &&
                box[2].innerHTML != ""
            ) {
                win(box[2].innerHTML);
            }
            else if (
                box[0].innerHTML == box[4].innerHTML &&
                box[4].innerHTML == box[8].innerHTML &&
                box[0].innerHTML != ""
            ) {
                win(box[0].innerHTML);
            }
            else if (
                box[2].innerHTML == box[4].innerHTML &&
                box[4].innerHTML == box[6].innerHTML &&
                box[2].innerHTML != ""
            ) {
                win(box[2].innerHTML);
            }
            // DRAW
            else {
                let count = 0;
                for (let i = 0; i < 9; i++) {
                    if (box[i].innerHTML != "") {
                        count++;
                    }
                }
                if (count == 9) {
                    msg.innerHTML = "Match Draw";
                    gameOver = true;
                }
            }
        }
        //    win function
        function win(player) {
            msg.innerHTML = player + " Wins";
            gameOver = true;
        }
        // RESTART
        function restart() {
            for (let i = 0; i < 9; i++) {
                box[i].innerHTML = "";
            }
            turn = "X";
            gameOver = false;
            msg.innerHTML = "Player X Turn";
        }
    </script>
</body>

</html>
