<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Practice UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5f5;
        padding: 20px;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
    }

    h2 {
        margin-bottom: 15px;
    }

    p {
        margin: 15px 0;
        color: #555;
        font-size: 14px;
    }

    .btn-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    button {
        padding: 12px;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }

    #first {
        background: #29ee29;
        border: none;
    }

    #first:hover {
        background: #20c720;
        transform: scale(1.05);
    }

    .second {
        border: 2px solid black;
        background: transparent;
    }

    .second:hover {
        background: black;
        color: white;
        transform: scale(1.05);
    }

    /* Tablet */
    @media (min-width: 600px) {
        .btn-group {
            flex-direction: row;
        }

        button {
            flex: 1;
        }
    }

</style>
</head>

<body>

<div class="container">
    <h2>🛒 Shopping Actions</h2>

    <div class="btn-group">
        <button id="first" onclick="addToBag()">Add to Bag</button>
        <button class="second" onclick="addToWishlist()">❤️ Wishlist</button>
    </div>

    <p>
        Simple JavaScript practice project demonstrating button interactions 
        with responsive design.
    </p>
</div>

<script>
    function addToBag() {
        alert("Item has been added to the Bag 🛍️");
    }

    function addToWishlist() {
        alert("Item added to Wishlist ❤️");
    }
</script>

</body>
</html>
