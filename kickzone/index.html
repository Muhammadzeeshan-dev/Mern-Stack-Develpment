<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickZone</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>KICK<span>ZONE</span></h2>

    <div class="nav-links">
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">New Arrivals</a>
        <a href="#">Sale</a>
    </div>

    <div class="cart">
        <i class="ri-shopping-cart-2-line"></i>
        <span>1</span>
    </div>
</div>

<!-- MENU -->
<div class="menu">
    Home › Men › Running › AirStrike Pro X1
</div>

<!-- PRODUCT -->
<div class="product">

    <!-- LEFT -->
    <div class="left">
        <span class="tag">NEW DROP</span>

        <div class="main-img">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
        </div>

        <div class="thumbs">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100">
            <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=100&q=80">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fHNob2VzfGVufDB8fDB8fHww">
            <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fHNob2VzfGVufDB8fDB8fHww" alt="">
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <p class="brand">NIKE RUNNING</p>

        <h1>AIRSTRIKE <br> PRO X1</h1>

        <div class="rating">
           <i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i> <b>4.8</b> <span>(2,341 reviews)</span>
        </div>

        <div class="price">
            <h2>$129.99</h2>
            <del>$179.99</del>
            <span class="off">28% OFF</span>
        </div>

        <hr>

        <!-- SIZE -->
        <div class="size">
            <p>SELECT SIZE</p>
            <div class="boxes">
                <div class="disable">38</div>
                <div>39</div>
                <div>40</div>
                <div>41</div>
                <div class="active">42</div>
                <div>43</div>
                <div class="disable">44</div>
                <div>45</div>
            </div>
        </div>

        <!-- COLOR -->
        <div class="color">
            <p>COLOR — FIRE RED</p>
            <div class="circles">
                <div class="c1 active"></div>
                <div class="c2"></div>
                <div class="c3"></div>
                <div class="c4"></div>
                <div class="c5"></div>
            </div>
        </div>

        <!-- QUANTITY -->
        <div class="qty">
            <p>QUANTITY</p>
            <div class="qbox">
                <span>-</span>
                <b>1</b>
                <span>+</span>
            </div>
            <small>✅ In Stock (17 left)</small>
        </div>

        <!-- BUTTON -->
        <div class="actions">
            <button>Add to Cart 🛒</button>
            <div class="heart"><i class="ri-heart-line"></i></div>
        </div>

    </div>
</div>

</body>
</html>
